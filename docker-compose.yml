version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: spotify_db
    environment:
      POSTGRES_USER: spotify_user
      POSTGRES_PASSWORD: spotify_password
      POSTGRES_DB: spotify_playlist_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotify_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spotify_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://spotify_user:spotify_password@postgres:5432/spotify_playlist_db
      JWT_SECRET: your-secret-key-change-in-production
      SPOTIFY_CLIENT_ID: 28cd22a51fff4f499901583a60f5a937
      SPOTIFY_CLIENT_SECRET: 46a4a05fab674c0d81e32f6d21b3955b
      DEBUG: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: python main.py

  nginx:
    image: nginx:alpine
    container_name: spotify_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
