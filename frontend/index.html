<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Playlist Generator</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- Auth Container -->
    <div id="auth-container" style="display: none;">
        <div class="auth-wrapper">
            <div class="auth-card">
                <h1>🎵 Spotify Playlist Generator</h1>
                <p style="color: var(--text-secondary); margin-bottom: 25px;">Sign in or create an account</p>

                <!-- Tabs -->
                <div class="auth-tabs">
                    <button id="login-tab" class="auth-tab active">Login</button>
                    <button id="register-tab" class="auth-tab">Register</button>
                </div>

                <!-- Status -->
                <div id="auth-status"></div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form">
                    <div class="form-group">
                        <label for="login-email">Email</label>
                        <input 
                            type="email" 
                            id="login-email" 
                            placeholder="Enter your email"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input 
                            type="password" 
                            id="login-password" 
                            placeholder="Enter your password"
                            required
                        >
                    </div>
                    <button type="submit" class="btn-primary">Login</button>
                </form>

                <!-- Register Form -->
                <form id="register-form" class="auth-form" style="display: none;">
                    <div class="form-group">
                        <label for="register-email">Email</label>
                        <input 
                            type="email" 
                            id="register-email" 
                            placeholder="Enter your email"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="register-username">Username</label>
                        <input 
                            type="text" 
                            id="register-username" 
                            placeholder="Choose a username"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="register-password">Password</label>
                        <input 
                            type="password" 
                            id="register-password" 
                            placeholder="At least 8 characters"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="register-password-confirm">Confirm Password</label>
                        <input 
                            type="password" 
                            id="register-password-confirm" 
                            placeholder="Confirm your password"
                            required
                        >
                    </div>
                    <button type="submit" class="btn-primary">Register</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Main Container -->
    <div id="main-container" style="display: none;">
        <header>
            <div class="container">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <div>
                        <h1>🎵 Spotify Playlist Generator</h1>
                        <p>Personal Playlist Generator with Collaborative Editing</p>
                    </div>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div id="spotify-status"></div>
                        <span id="user-info" style=""></span>
                        <button id="logout-btn" class="btn-logout">Logout</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="container">
            <!-- Status Messages -->
            <div id="status"></div>

            <!-- Loading Indicator -->
            <div id="loading">
                <p>⏳ Loading...</p>
            </div>

            <!-- Create Playlist Form -->
            <div class="card">
                <h2>Your Favorite Genres</h2>
                <div id="favorite-genres" style="margin-bottom: 20px;">
                    <div style="display: flex; flex-wrap: wrap; gap: 8px;" id="genres-container">
                        <p style="color: var(--text-secondary);">Loading genres...</p>
                    </div>
                    <button type="button" id="refresh-genres-btn" class="btn-secondary" style="margin-top: 10px;">🔄 Refresh Genres</button>
                </div>
            </div>

            <div class="card">
                <h2>Create New Playlist</h2>
                <form id="playlist-form">
                    <div class="form-group">
                        <label for="playlist-name">Playlist Name *</label>
                        <input 
                            type="text" 
                            id="playlist-name" 
                            placeholder="Enter playlist name"
                            required
                        >
                    </div>
                    <div class="form-group">
                        <label for="playlist-description">Description</label>
                        <textarea 
                            id="playlist-description" 
                            placeholder="Enter playlist description (optional)"
                            rows="3"
                        ></textarea>
                    </div>
                    <div class="button-group">
                        <button type="submit">Create Playlist</button>
                        <button type="reset">Clear</button>
                    </div>
                </form>
            </div>

            <!-- Playlists List -->
            <div class="card">
                <h2>Your Playlists</h2>
                <div id="playlists-list">
                    <p style="color: var(--text-secondary);">Loading playlists...</p>
                </div>
            </div>

            <!-- Search Modal -->
            <div id="search-modal" style="display: none;">
                <div class="modal-overlay"></div>
                <div class="modal-content">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2>Search Tracks</h2>
                        <button id="close-search-modal" class="btn-close">✕</button>
                    </div>
                    <div class="form-group">
                        <input 
                            type="text" 
                            id="search-input" 
                            placeholder="Search for tracks..."
                            autocomplete="off"
                        >
                    </div>
                    <div id="search-results" style="max-height: 400px; overflow-y: auto;">
                        <p style="color: var(--text-secondary);">Type to search...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>
</html>
