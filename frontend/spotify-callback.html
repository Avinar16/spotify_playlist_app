<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify Authorization</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #1DB954;
        }
        .container {
            text-align: center;
            color: white;
        }
        h1 {
            margin: 0 0 10px 0;
        }
        p {
            margin: 0;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Connecting to Spotify...</h1>
        <p>This window will close automatically</p>
    </div>

    <script>
        // Extract code from URL
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const error = params.get('error');

        if (error) {
            window.opener.postMessage({
                type: 'SPOTIFY_AUTH_ERROR',
                error: error,
            }, '*');
            window.close();
        } else if (code) {
            // Send code to opener (parent window)
            window.opener.postMessage({
                type: 'SPOTIFY_AUTH_CODE',
                code: code,
            }, '*');
            window.close();
        } else {
            document.body.innerHTML = '<p style="color: white; padding: 20px;">No code received. Please try again.</p>';
            setTimeout(() => window.close(), 2000);
        }
    </script>
</body>
</html>
